<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla - Cocina y Caja</title>
    <style>
        /* ESTILOS DE PANTALLA */
        :root { --alerta: #ff9800; --fondo: #e0e0e0; --texto: #1a1a1a; --verde: #2e7d32; --rojo: #d32f2f; --azul: #1976d2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--fondo); padding: 0; margin:0; }
        
        #pantalla-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; }
        .login-box button { width: 100%; background: var(--verde); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #error-sistema { display: none; background: var(--rojo); color: white; padding: 15px; border-radius: 8px; margin-top: 20px; width: 90%; max-width: 400px; text-align: center; font-weight: bold; }

        #pantalla-app { display: none; padding: 20px; }
        .header { background: #1a1a1a; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .reloj { font-size: 1.2rem; font-weight: bold; color: var(--alerta); }
        .btn-header { background: white; color: #1a1a1a; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .grid-tickets { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .ticket { background: white; border-top: 8px solid var(--alerta); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
        .mesa { font-size: 1.5rem; font-weight: bold; }
        .lista-platillos { flex-grow: 1; list-style: none; margin-bottom: 15px; }
        .lista-platillos li { font-size: 1.1rem; padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-weight: 500; }
        
        .btn-listo { background: var(--verde); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* BOTÓN DE WHATSAPP NUEVO */
        .btn-wa-confirmar { background: #25D366; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 8px; }
        .btn-wa-confirmar:hover { background: #1ebe56; }

        .estado-vacio { text-align: center; color: #666; font-size: 1.2rem; grid-column: 1 / -1; padding: 40px; background: white; border-radius: 8px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--fondo); border-radius: 12px; width: 95%; max-width: 600px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { background: #1a1a1a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; overflow-y: auto; }
        .tarjeta-cuenta { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 6px solid var(--verde); display: flex; justify-content: space-between; align-items: center; }
        .select-pago { padding: 8px; border-radius: 6px; border: 1px solid #ccc; }

        /* IMPRESIÓN */
        #zona-impresion { display: none; }
        @media print {
            body > *:not(#zona-impresion) { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            #zona-impresion { display: block !important; width: 48mm; margin: 0; color: black; font-family: monospace; font-size: 10px; }
            
            .ticket-print-header { text-align: center; border-bottom: 1px dashed black; padding-bottom: 5px; margin-bottom: 5px; }
            .logo-container { display: inline-block; vertical-align: middle; width: 30%; }
            .title-container { display: inline-block; vertical-align: middle; width: 65%; text-align: left; }
            .ticket-logo-img { width: 12mm; height: auto; display: block; filter: grayscale(100%); }
            .ticket-print-title { font-size: 14px; font-weight: bold; }
            .ticket-print-item { margin-bottom: 3px; border-bottom: 0.5px solid #eee; padding-bottom: 2px; }
            .ticket-print-footer { text-align: center; border-top: 1px dashed black; padding-top: 5px; margin-top: 10px; font-weight: bold; }
        }
    </style>
</head>
<body>

    <div id="pantalla-login">
        <div class="login-box">
            <h2>🔥 Jícamas Gus</h2>
            <input type="email" id="login-email" placeholder="Correo">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button onclick="iniciarSesion()">Ingresar</button>
            <p id="login-error" style="color:red; display:none; margin-top:10px;"></p>
        </div>
        <div id="error-sistema"></div>
    </div>

    <div id="pantalla-app">
        <div class="header">
            <h2>🔥 COCINA 
                <button class="btn-header" onclick="abrirModalCuentas()">💰 Cuentas</button>
                <button class="btn-header" onclick="abrirModalCorte()" style="background:var(--azul); color:white;">📊 Corte</button>
                <button class="btn-header" onclick="cerrarSesion()" style="background:var(--rojo); color:white;">Salir</button>
            </h2>
            <div class="reloj" id="reloj">00:00</div>
        </div>
        <div class="grid-tickets" id="contenedor-tickets"></div>
    </div>

    <div class="modal-overlay" id="modal-cuentas">
        <div class="modal-content">
            <div class="modal-header"><h2>Cuentas Activas</h2><button style="color:white; background:none; border:none; font-size:1.5rem;" onclick="cerrarModal('modal-cuentas')">✖</button></div>
            <div class="modal-body" id="contenedor-cuentas"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-corte">
        <div class="modal-content">
            <div class="modal-header" style="background:var(--azul);"><h2>Corte Diario</h2><button style="color:white; background:none; border:none; font-size:1.5rem;" onclick="cerrarModal('modal-corte')">✖</button></div>
            <div class="modal-body" id="datos-corte"></div>
        </div>
    </div>

    <div id="zona-impresion"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        // CAPTURADOR DE ERRORES GLOBALES
        window.onerror = function(message) {
            const errBox = document.getElementById('error-sistema');
            errBox.style.display = 'block';
            errBox.innerHTML = `⚠️ Error detectado:<br><small>${message}</small>`;
        };

        let auth, db;

        try {
            // --- 1. FIREBASE CONFIG ---
         const firebaseConfig = {
  apiKey: "AIzaSyAECacQfYMN5yds-bXYDbw1RGEhfJ3K7Bs",
  authDomain: "jicamasguspunto.firebaseapp.com",
  projectId: "jicamasguspunto",
  storageBucket: "jicamasguspunto.firebasestorage.app",
  messagingSenderId: "737468341092",
  appId: "1:737468341092:web:ef25693f5d8c65dfbbb871"
};
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();

            auth.onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('pantalla-login').style.display = 'none';
                    document.getElementById('pantalla-app').style.display = 'block';
                    iniciarSistemaCocina();
                } else {
                    document.getElementById('pantalla-login').style.display = 'flex';
                    document.getElementById('pantalla-app').style.display = 'none';
                }
            });
        } catch (e) {
            document.getElementById('error-sistema').style.display = 'block';
            document.getElementById('error-sistema').innerText = "Error en credenciales de Firebase";
        }

        function iniciarSesion() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(() => {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('login-error').innerText = "Acceso denegado";
            });
        }

        function cerrarSesion() { auth.signOut(); }

        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);

        let esCargaInicial = true;
        let comandasProcesadas = new Set();
        let cuentasPorMesaGlobal = {};

        function iniciarSistemaCocina() {
            db.collection("comandas").where("estado", "in", ["pendiente", "completado"]).onSnapshot((snapshot) => {
                let pendientes = [];
                let resumen = {};

                snapshot.forEach(doc => {
                    const orden = doc.data();
                    if(!resumen[orden.mesa]) resumen[orden.mesa] = { total: 0, ids: [], items: [] };
                    resumen[orden.mesa].total += (orden.total || 0);
                    resumen[orden.mesa].ids.push(doc.id);
                    resumen[orden.mesa].items.push(...orden.items);
                    if(orden.estado === "pendiente") pendientes.push({ id: doc.id, ...orden });
                });

                cuentasPorMesaGlobal = resumen;
                if(document.getElementById('modal-cuentas').style.display === 'flex') renderizarModalCuentas();

                snapshot.docChanges().forEach(change => {
                    if (change.type === "added" && change.doc.data().estado === "pendiente") {
                        if (!esCargaInicial && !comandasProcesadas.has(change.doc.id)) {
                            imprimirTicketCocina(change.doc.data());
                        }
                        comandasProcesadas.add(change.doc.id);
                    }
                });
                esCargaInicial = false;

                const cont = document.getElementById('contenedor-tickets');
                cont.innerHTML = '';
                
                if (pendientes.length === 0) {
                    cont.innerHTML = '<div class="estado-vacio">No hay pedidos pendientes. ✨</div>';
                    return;
                }
                
                pendientes.sort((a,b) => a.timestamp - b.timestamp).forEach(orden => {
                    const itemsHTML = orden.items.map(i => `<li>👉 ${i}</li>`).join('');
                    
                    // --- BOTÓN DE WHATSAPP ---
                    let botonWhatsApp = '';
                    if (orden.clienteTelefono) {
                        let telLimpio = orden.clienteTelefono.replace(/\D/g, '');
                        if (telLimpio.length === 10) telLimpio = '52' + telLimpio;
                        
                        let tipoTexto = orden.tipoEntrega === 'domicilio' ? 'para enviar a tu domicilio' : 'para que pases a recogerla';
                        let mensajeWA = encodeURIComponent(`Hola ${orden.clienteNombre}, recibimos tu orden en *Jícamas Gus* por un total de $${(orden.total || 0).toFixed(2)}. ¡Ya la estamos preparando ${tipoTexto}! 👨‍🍳✨`);
                        
                        botonWhatsApp = `<button class="btn-wa-confirmar" onclick="window.open('https://wa.me/${telLimpio}?text=${mensajeWA}', '_blank')">📲 Confirmar por WA</button>`;
                    }

                    const div = document.createElement('div');
                    div.className = 'ticket';
                    div.innerHTML = `
                        <div class="ticket-header">
                            <span class="mesa" style="font-size: 1.1rem;">${orden.mesa}</span>
                            <span class="hora">🕒 ${orden.hora}</span>
                        </div>
                        <ul class="lista-platillos">${itemsHTML}</ul>
                        ${botonWhatsApp}
                        <button class="btn-listo" onclick="marcarListo('${orden.id}')">✔️ Marcar Listo</button>
                    `;
                    cont.appendChild(div);
                });
            });
        }

        async function marcarListo(id) { await db.collection("comandas").doc(id).update({ estado: "completado" }); }

        function imprimirTicketCocina(orden) {
            const zona = document.getElementById('zona-impresion');
            zona.innerHTML = `<div class="ticket-print-header"><b>ORDEN: ${orden.mesa}</b><br>${orden.hora}</div><div>${orden.items.map(i => `<div class="ticket-print-item">- ${i.replace(/<\/?[^>]+(>|$)/g, " ")}</div>`).join('')}</div>`;
            window.print();
        }

        function imprimirTicketVenta(mesa, items, total, formaPago) {
            const zona = document.getElementById('zona-impresion');
            let itemsHtml = items.map(i => `<div class="ticket-print-item">${i.replace(/<\/?[^>]+(>|$)/g, " ")}</div>`).join('');
            
            zona.innerHTML = `
                <div class="ticket-print-header">
                    <div class="logo-container">
                        <img id="img-logo-ticket" src="img/gus.png" class="ticket-logo-img">
                    </div>
                    <div class="title-container">
                        <div class="ticket-print-title">JíCAMAS GUS</div>
                        <div style="font-size:9px;">Mesa: ${mesa}</div>
                        <div style="font-size:9px;">${new Date().toLocaleDateString()}</div>
                    </div>
                </div>
                <div style="margin:5px 0;">${itemsHtml}</div>
                <div class="ticket-print-footer">
                    TOTAL: $${total.toFixed(2)}<br>
                    Pago: ${formaPago}
                </div>`;

            const logo = document.getElementById('img-logo-ticket');
            const ejecutarImpresion = () => { window.print(); };

            if (logo.complete) {
                ejecutarImpresion();
            } else {
                logo.onload = ejecutarImpresion;
                logo.onerror = () => { logo.style.display = 'none'; ejecutarImpresion(); };
            }
        }

        function abrirModalCuentas() { renderizarModalCuentas(); document.getElementById('modal-cuentas').style.display = 'flex'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        function renderizarModalCuentas() {
            const cont = document.getElementById('contenedor-cuentas');
            cont.innerHTML = '';
            
            const mesas = Object.keys(cuentasPorMesaGlobal).sort((a,b) => a.localeCompare(b, undefined, {numeric:true}));
            if(mesas.length === 0) {
                cont.innerHTML = '<p style="text-align:center; color:#666; margin-top:20px;">No hay cuentas activas.</p>';
                return;
            }

            mesas.forEach(mesa => {
                const c = cuentasPorMesaGlobal[mesa];
                const idSel = "pago-" + mesa.replace(/\s+/g, '');
                cont.innerHTML += `<div class="tarjeta-cuenta"><div><b>${mesa}</b><br>$${c.total.toFixed(2)}</div><div><select id="${idSel}" class="select-pago"><option>Efectivo</option><option>Tarjeta</option><option>Transferencia</option></select><button class="btn-listo" style="margin-left:5px; width:auto;" onclick="cobrarMesa('${mesa}', '${idSel}')">Cobrar e Imprimir</button></div></div>`;
            });
        }

        async function cobrarMesa(mesa, idSel) {
            const pago = document.getElementById(idSel).value;
            const c = cuentasPorMesaGlobal[mesa];
            if(!confirm("¿Cobrar e imprimir ticket?")) return;
            
            imprimirTicketVenta(mesa, c.items, c.total, pago);
            
            const batch = db.batch();
            const fecha = new Date().toLocaleDateString('es-MX');
            c.ids.forEach(id => batch.update(db.collection("comandas").doc(id), { estado: "pagado", formaPago: pago, fechaPago: fecha }));
            await batch.commit();
        }

        async function abrirModalCorte() {
            document.getElementById('modal-corte').style.display = 'flex';
            const cont = document.getElementById('datos-corte');
            const fecha = new Date().toLocaleDateString('es-MX');
            cont.innerHTML = "Cargando...";
            const snap = await db.collection("comandas").where("fechaPago", "==", fecha).get();
            let t = {Efectivo:0, Tarjeta:0, Transferencia:0}, g = 0;
            snap.forEach(d => { const dat = d.data(); if(dat.estado==="pagado"){ t[dat.formaPago]+=(dat.total||0); g+=(dat.total||0); } });
            cont.innerHTML = `<p>💵 Efectivo: $${t.Efectivo.toFixed(2)}</p><p>💳 Tarjeta: $${t.Tarjeta.toFixed(2)}</p><p>📱 Transf: $${t.Transferencia.toFixed(2)}</p><hr><h3>TOTAL: $${g.toFixed(2)}</h3>`;
        }
    </script>
</body>
</html>
